<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NFA">
<title>Nusantara Fishing Adventure</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#0a0f1a;--bg2:#0d1520;--bg3:#111c2e;
  --panel:#0a1020;--panel2:#0e1828;
  --border:#1a2840;--border2:#243650;
  --gold:#f5c842;--gold2:#d4a520;
  --blue:#4a9eff;--blue2:#2d7acc;
  --green:#3ddc84;--red:#ff4757;
  --purple:#a855f7;--cyan:#22d3ee;
  --text:#dce8f5;--muted:#5a7898;--dim:#2a4060;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#g{width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg)}
.scr{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.scr.on{display:flex}

/* ══ MAP ══ */
#sMap{background:#04090f}
#mapHdr{background:var(--panel);border-bottom:2px solid var(--border2);padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-title{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:3px}
.hdr-stats{display:flex;gap:10px}
.hstat{font-size:10px;color:var(--muted);letter-spacing:1px}
.hstat b{color:var(--gold);font-size:12px}
#mapWrap{flex:1;position:relative;overflow:hidden}
#mapC{width:100%;height:100%;display:block}
#locPanel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(5,12,25,0.97) 30%);padding:14px 14px 8px;pointer-events:none;transition:opacity 0.3s}
.lp-name{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px}
.lp-region{font-size:10px;color:var(--muted);margin-top:1px}
.lp-fish{font-size:10px;color:var(--cyan);margin-top:4px}
.lp-spots{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px}
#mapFtr{background:var(--panel);border-top:2px solid var(--border2);padding:8px 10px;display:flex;gap:8px;flex-shrink:0}
.mbtn{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 4px;border-radius:6px;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;letter-spacing:1px;transition:all 0.1s;text-align:center}
.mbtn:active{transform:scale(0.95);background:var(--border2)}
.mbtn.gold{background:#2a1f00;border-color:var(--gold2);color:var(--gold)}
.mbtn.blue{background:#001a3a;border-color:var(--blue2);color:var(--blue)}
.mbtn.purple{background:#1a0a2e;border-color:#7c3aed;color:var(--purple)}

/* ══ FISH ══ */
#sFish{background:#050d18}
#fishHdr{background:var(--panel);border-bottom:2px solid var(--border2);padding:5px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:36px}
.fh-loc{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px}
.fh-spot{font-size:9px;color:var(--muted)}
.fh-right{font-size:9px;color:var(--cyan);text-align:right}
#fishC{width:100%;display:block;flex:1;min-height:0}
#fishUI{flex-shrink:0;background:var(--panel);border-top:2px solid var(--border2)}
#barsArea{padding:6px 10px 4px;display:flex;flex-direction:column;gap:3px}
.brow{display:flex;align-items:center;gap:6px;height:16px}
.blbl{font-size:9px;color:var(--muted);letter-spacing:1px;width:52px;text-align:right;flex-shrink:0}
.bbg{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;border:1px solid var(--dim)}
.bfill{height:100%;border-radius:4px;transition:width 0.08s}
#btnsArea{display:flex;gap:6px;padding:6px 10px 8px}
.fbtn{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 4px;border-radius:8px;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;font-weight:700;letter-spacing:1px;transition:all 0.1s;text-align:center}
.fbtn:active{transform:scale(0.94)}
.fbtn.cast{background:#001a3a;border-color:var(--blue2);color:var(--blue)}
.fbtn.reel{background:#002a0f;border-color:#22c55e;color:var(--green);display:none}
.fbtn.npc{background:#1a0a2e;border-color:#7c3aed;color:var(--purple)}
.fbtn.back{background:#1a0505;border-color:#7f1d1d;color:var(--red);max-width:54px;font-size:10px}
#minimap{position:absolute;bottom:0;right:0;width:88px;height:72px;background:rgba(0,0,0,0.8);border-left:1px solid var(--border2);border-top:1px solid var(--border2)}
#msgBar{position:absolute;top:6px;left:6px;right:100px;pointer-events:none}
.msg-pill{background:rgba(0,0,0,0.82);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text);display:inline-block;opacity:0;transition:opacity 0.3s;max-width:100%}
.msg-pill.show{opacity:1}
#fishHudStats{position:absolute;top:40px;left:6px;display:flex;flex-direction:column;gap:3px;pointer-events:none}
.hpill{background:rgba(0,0,0,0.75);border:1px solid var(--dim);border-radius:4px;padding:2px 7px;font-size:9px;color:var(--muted);letter-spacing:1px}
.hpill b{color:var(--gold)}
/* Weather HUD */
#weatherHud{position:absolute;top:40px;right:6px;pointer-events:none}
.whud{background:rgba(0,0,0,0.75);border:1px solid var(--dim);border-radius:4px;padding:2px 7px;font-size:10px;text-align:center}

/* ══ NPC ══ */
#sNpc{background:var(--bg)}
#npcHdr{background:var(--panel);border-bottom:2px solid var(--border2);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.npc-hdr-title{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
.back-sm{background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:3px 10px;border-radius:4px;font-size:9px;font-family:'Courier New',monospace;cursor:pointer;letter-spacing:1px}
#npcScene{flex:1;position:relative;overflow:hidden;min-height:0}
#npcBg{width:100%;height:100%;display:block;position:absolute;inset:0}
#npcPortrait{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:72px;line-height:1}
#npcDialog{flex-shrink:0;background:var(--panel);border-top:2px solid var(--border2);padding:10px}
#npcName{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:2px}
#npcRole{font-size:9px;color:var(--muted);margin-bottom:8px;letter-spacing:1px}
#dialogText{font-size:11px;color:var(--text);line-height:1.6;min-height:36px;margin-bottom:8px;padding:8px;background:var(--bg3);border:1px solid var(--dim);border-radius:6px}
#choices{display:flex;flex-direction:column;gap:5px;max-height:130px;overflow-y:auto}
.choice{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:6px;font-size:10px;font-family:'Courier New',monospace;cursor:pointer;text-align:left;line-height:1.4}
.choice:active{background:var(--border2)}
.choice.q{border-color:#7c3aed;color:#c084fc}
.choice.ok{border-color:var(--green);color:var(--green)}

/* ══ QUEST ══ */
#sQuest{background:var(--bg)}
#qHdr{background:var(--panel);border-bottom:2px solid var(--border2);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#qBody{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.qcard{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.qcard.active{border-color:#7c3aed}
.qcard.done{border-color:var(--green)}
.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.qtitle{font-size:11px;font-weight:700;color:var(--text);letter-spacing:1px}
.qbadge{font-size:9px;padding:1px 7px;border-radius:3px;letter-spacing:1px;font-weight:700}
.qb-new{background:rgba(74,158,255,0.15);color:var(--blue)}
.qb-act{background:rgba(168,85,247,0.15);color:var(--purple)}
.qb-done{background:rgba(61,220,132,0.15);color:var(--green)}
.qdesc{font-size:10px;color:var(--muted);margin-bottom:7px;line-height:1.5}
.qpbar{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.qpbg{flex:1;height:5px;background:var(--dim);border-radius:3px;overflow:hidden}
.qpfill{height:100%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:3px;transition:width 0.4s}
.qrew{font-size:9px;color:var(--gold);letter-spacing:1px}

/* ══ SHOP ══ */
#sShop{background:var(--bg)}
#shopHdr{background:var(--panel);border-bottom:2px solid var(--border2);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#shopBody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.shop-coins{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:1px}
.shop-coins b{color:var(--gold)}
.rod-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.rod-card.owned{border-color:var(--green)}
.rod-card.equipped{border-color:var(--gold);background:#1a1200}
.rod-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.rod-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px}
.rod-badge{font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:1px;font-weight:700}
.rb-owned{background:rgba(61,220,132,0.15);color:var(--green)}
.rb-equip{background:rgba(245,200,66,0.2);color:var(--gold)}
.rb-lock{background:rgba(90,120,152,0.15);color:var(--muted)}
.rod-stats{display:flex;gap:12px;margin:6px 0;font-size:10px;color:var(--muted)}
.rod-stats span{color:var(--cyan)}
.rod-desc{font-size:10px;color:var(--muted);margin-bottom:8px}
.rod-btn{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px;border-radius:6px;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;font-weight:700;letter-spacing:1px}
.rod-btn.buy{background:#001a3a;border-color:var(--blue2);color:var(--blue)}
.rod-btn.equip{background:#1a1200;border-color:var(--gold2);color:var(--gold)}
.rod-btn:disabled{opacity:0.4;cursor:not-allowed}

/* ══ CATCH POPUP ══ */
#catchPop{position:absolute;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:99;flex-direction:column}
#catchPop.on{display:flex}
#catchCard{background:var(--panel);border-radius:16px;padding:24px 28px;text-align:center;width:min(280px,88%);animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0.3) rotate(-8deg);opacity:0}to{transform:none;opacity:1}}
.cc-emoji{font-size:64px;margin-bottom:6px;display:block}
.cc-name{font-size:16px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.cc-rar{font-size:10px;padding:2px 12px;border-radius:3px;display:inline-block;margin-bottom:10px;letter-spacing:2px;font-weight:700}
.r-common{background:rgba(90,120,152,0.2);color:#7a9ab8;border:1px solid #2a4060}
.r-rare{background:rgba(74,158,255,0.15);color:var(--blue);border:1px solid #1a4080}
.r-epic{background:rgba(168,85,247,0.15);color:var(--purple);border:1px solid #4c1d95}
.r-legendary{background:rgba(245,200,66,0.15);color:var(--gold);border:1px solid var(--gold2)}
.cc-coins{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
.cc-desc{font-size:10px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.cc-btn{width:100%;background:#001a3a;border:1px solid var(--blue2);color:var(--blue);padding:10px;border-radius:8px;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;font-weight:700;letter-spacing:2px}

/* ══ TOAST ══ */
#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold2);border-radius:20px;padding:6px 16px;font-size:11px;color:var(--gold);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;white-space:nowrap;letter-spacing:1px}

/* Weather overlay */
.rain-canvas{position:absolute;inset:0;pointer-events:none;z-index:2}
</style>
</head>
<body>
<div id="g">

<!-- MAP -->
<div id="sMap" class="scr on">
  <div id="mapHdr">
    <div class="game-title">NF ADVENTURE</div>
    <div class="hdr-stats">
      <div class="hstat">KOIN <b id="mCoin">0</b></div>
      <div class="hstat">IKAN <b id="mCatch">0</b></div>
    </div>
  </div>
  <div id="mapWrap">
    <canvas id="mapC"></canvas>
    <div id="locPanel">
      <div class="lp-name" id="lpName">DANAU TOBA</div>
      <div class="lp-region" id="lpRegion">Sumatra Utara</div>
      <div class="lp-fish" id="lpFish">Mas · Mujair · Gabus · Dekke</div>
      <div class="lp-spots" id="lpSpots">3 SPOT TERSEDIA</div>
    </div>
  </div>
  <div id="mapFtr">
    <button class="mbtn" onclick="S('sQuest');renderQuests()">QUEST</button>
    <button class="mbtn gold" onclick="goFish()">MANCING ►</button>
    <button class="mbtn purple" onclick="S('sShop');renderShop()">TOKO</button>
    <button class="mbtn blue" onclick="goNPC('map')">NPC</button>
  </div>
</div>

<!-- FISH -->
<div id="sFish" class="scr">
  <div id="fishHdr">
    <div><div class="fh-loc" id="fhLoc">-</div><div class="fh-spot" id="fhSpot">-</div></div>
    <div class="fh-right" id="fhRight">BAMBU</div>
  </div>
  <canvas id="fishC"></canvas>
  <canvas class="rain-canvas" id="rainC"></canvas>
  <div id="fishUI">
    <div id="barsArea">
      <div class="brow" id="bCast" style="display:none"><span class="blbl">LEMPAR</span><div class="bbg"><div class="bfill" id="bCastF" style="width:0%;background:linear-gradient(90deg,#3ddc84,#f5c842,#ff4757)"></div></div></div>
      <div class="brow" id="bReel" style="display:none"><span class="blbl">JARAK</span><div class="bbg"><div class="bfill" id="bReelF" style="width:0%;background:linear-gradient(90deg,#ff4757,#f5c842,#3ddc84)"></div></div></div>
      <div class="brow" id="bTens" style="display:none"><span class="blbl">SENAR</span><div class="bbg"><div class="bfill" id="bTensF" style="width:40%"></div></div></div>
    </div>
    <div id="btnsArea">
      <button class="fbtn back" onclick="leaveSpot()">◄</button>
      <button class="fbtn cast" id="bCastBtn" onmousedown="startCast()" onmouseup="relCast()" ontouchstart="startCast()" ontouchend="relCast()">LEMPAR</button>
      <button class="fbtn reel" id="bReelBtn" onclick="tapReel()">TARIK!</button>
      <button class="fbtn npc" onclick="goNPC('fish')">NPC</button>
    </div>
  </div>
  <div id="minimap"><canvas id="mmC" width="88" height="72"></canvas></div>
  <div id="msgBar"><div class="msg-pill" id="msgPill"></div></div>
  <div id="fishHudStats">
    <div class="hpill">KOIN <b id="fCoin">0</b></div>
    <div class="hpill">IKAN <b id="fCatch">0</b></div>
  </div>
  <div id="weatherHud"><div class="whud" id="wHud">☀️</div></div>
</div>

<!-- NPC -->
<div id="sNpc" class="scr">
  <div id="npcHdr">
    <span class="npc-hdr-title" id="npcLocLabel">NPC</span>
    <button class="back-sm" id="npcBackBtn">◄ KEMBALI</button>
  </div>
  <div id="npcScene">
    <canvas id="npcBg"></canvas>
    <div id="npcPortrait">👴</div>
  </div>
  <div id="npcDialog">
    <div id="npcName">-</div>
    <div id="npcRole">-</div>
    <div id="dialogText">...</div>
    <div id="choices"></div>
  </div>
</div>

<!-- QUEST -->
<div id="sQuest" class="scr">
  <div id="qHdr">
    <span style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px">QUEST BOARD</span>
    <button class="back-sm" onclick="S('sMap')">◄ KEMBALI</button>
  </div>
  <div id="qBody"></div>
</div>

<!-- SHOP -->
<div id="sShop" class="scr">
  <div id="shopHdr">
    <span style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px">TOKO PANCING</span>
    <button class="back-sm" onclick="S('sMap')">◄ KEMBALI</button>
  </div>
  <div id="shopBody"></div>
</div>

<!-- CATCH POPUP -->
<div id="catchPop">
  <div id="catchCard">
    <span class="cc-emoji" id="ccEmo">🐟</span>
    <div class="cc-name" id="ccName">IKAN</div>
    <div class="cc-rar r-common" id="ccRar">COMMON</div>
    <div class="cc-coins" id="ccCoins">+0 KOIN</div>
    <div class="cc-desc" id="ccDesc">-</div>
    <button class="cc-btn" onclick="closeCatch()">[ SIMPAN KE KOLEKSI ]</button>
  </div>
</div>

<div id="toast"></div>
</div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const FDB={
  mas:{n:'Ikan Mas',e:'🐠',r:'common',min:150,max:400,d:'Ikan air tawar populer Nusantara'},
  mujair:{n:'Ikan Mujair',e:'🐟',r:'common',min:100,max:320,d:'Asli Danau Toba, lezat dibakar'},
  gabus:{n:'Ikan Gabus',e:'🐡',r:'rare',min:500,max:1400,d:'Predator ganas air tawar'},
  dekke:{n:'Dekke Mas Toba',e:'🎏',r:'epic',min:2000,max:6000,d:'Sangat sakral dalam adat Batak'},
  napoleon:{n:'Napoleon Wrasse',e:'🐠',r:'legendary',min:8000,max:22000,d:'Raja karang, ikan terbesar terumbu'},
  kakap:{n:'Kakap Merah',e:'🐟',r:'rare',min:700,max:2000,d:'Favorit nelayan Maluku & Papua'},
  kerapu:{n:'Kerapu Sunu',e:'🐡',r:'rare',min:600,max:1800,d:'Hidup di celah terumbu karang'},
  kupu:{n:'Ikan Kupu-Kupu',e:'🦋',r:'rare',min:350,max:900,d:'Warna-warni indah penanda karang sehat'},
  pesut:{n:'Pesut Mahakam',e:'🐬',r:'legendary',min:0,max:0,d:'Lumba-lumba air tawar, DILINDUNGI!',spec:'release'},
  patin:{n:'Ikan Patin',e:'🐟',r:'common',min:250,max:700,d:'Sumber protein utama Kalimantan'},
  baung:{n:'Ikan Baung',e:'🐡',r:'rare',min:500,max:1400,d:'Lele sungai berbadan besar'},
  arwana:{n:'Arwana Super Red',e:'🐉',r:'legendary',min:10000,max:35000,d:'Ikan naga Kalimantan, harga selangit!'},
  tongkol:{n:'Ikan Tongkol',e:'🐟',r:'common',min:200,max:500,d:'Tulang punggung nelayan Laut Jawa'},
  cumi:{n:'Cumi-Cumi',e:'🦑',r:'rare',min:350,max:1000,d:'Moluska laut favorit restoran'},
  udang:{n:'Udang Windu',e:'🦐',r:'rare',min:800,max:2500,d:'Udang jumbo premium ekspor'},
  butini:{n:'Ikan Butini',e:'🐟',r:'epic',min:1500,max:4200,d:'Endemik hanya ada di Danau Matano'},
  sogili:{n:'Sogili Raksasa',e:'🐍',r:'epic',min:1200,max:3600,d:'Belut danau terpanjang Asia Tenggara'},
  opudi:{n:'Ikan Opudi',e:'🐠',r:'rare',min:600,max:1600,d:'Endemik Sulawesi, warna biru terang'},
};

const RODS=[
  {id:'bambu',name:'Joran Bambu',icon:'🎋',power:1,speed:1,price:0,desc:'Starter rod, tahan banting'},
  {id:'fiber',name:'Fiber Glass',icon:'🎣',power:1.6,speed:1.4,price:800,desc:'+60% kekuatan lempar'},
  {id:'carbon',name:'Carbon Fiber',icon:'⚡',power:2.5,speed:2.0,price:3000,desc:'Pro angler, ringan & kuat'},
  {id:'titan',name:'Titanium Elite',icon:'💎',power:4.0,speed:3.0,price:12000,desc:'Rod terbaik, ikan legendary gampang'},
];

const LOCS=[
  {id:'toba',name:'Danau Toba',region:'Sumatra Utara',col:'#0a3a5a',wCol:'#1060a0',skyCol:'#0d2a45',
   spots:[

function saveGame(){
  const data={
    coins:G.coins,total:G.total,col:G.col,rod:G.rod,
    qProg:G.qProg,qDone:G.qDone,locI:G.locI
  };
  try{localStorage.setItem('nfa_save',JSON.stringify(data));}catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem('nfa_save');
    if(!raw) return;
    const d=JSON.parse(raw);
    G.coins=d.coins||0; G.total=d.total||0;
    G.col=d.col||{}; G.rod=d.rod||0;
    G.qProg=d.qProg||{}; G.qDone=d.qDone||[];
    G.locI=d.locI||0;
  }catch(e){}
}

function randomWeather(){
  const w=[0,0,0,1,1,2,3];
  curWeather=w[Math.floor(Math.random()*w.length)];
  document.getElementById('wHud').textContent=WEATHERS[curWeather].icon+' '+WEATHERS[curWeather].label;
}
function initRain(canvas){
  rainDrops=[];
  const w=canvas.width,h=canvas.height;
  const cnt=WEATHERS[curWeather].id==='storm'?200:100;
  for(let i=0;i<cnt;i++) rainDrops.push({x:Math.random()*w,y:Math.random()*h,spd:8+Math.random()*6,len:10+Math.random()*15});
}
function drawRain(canvas){
  const alpha=WEATHERS[curWeather].rainAlpha;
  if(alpha===0){canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);return;}
  const rc=canvas.getContext('2d');
  rc.clearRect(0,0,canvas.width,canvas.height);
  rc.strokeStyle=`rgba(160,210,255,${alpha*0.6})`;
  rc.lineWidth=1;
  rainDrops.forEach(d=>{
    rc.beginPath();rc.moveTo(d.x,d.y);rc.lineTo(d.x-2,d.y+d.len);rc.stroke();
    d.y+=d.spd;d.x-=1.5;
    if(d.y>canvas.height){d.y=-20;d.x=Math.random()*canvas.width;}
  });
}

const LON_MIN=94.5, LON_MAX=142.0, LAT_MIN=-10.5, LAT_MAX=6.5;

function geoToXY(lon,lat,w,h){
  const x=(lon-LON_MIN)/(LON_MAX-LON_MIN)*w;
  const y=(1-(lat-LAT_MIN)/(LAT_MAX-LAT_MIN))*h;
  return [x,y];
}

function drawBeautifulMap(t){
  if(!MW||!MH) return;
  mapT=t;

  // Deep ocean — real maritime feel
  const oceanGrad=mc.createLinearGradient(0,0,0,MH);
  oceanGrad.addColorStop(0,'#03090f');
  oceanGrad.addColorStop(0.5,'#04101e');
  oceanGrad.addColorStop(1,'#030c18');
  mc.fillStyle=oceanGrad; mc.fillRect(0,0,MW,MH);

  // Ocean depth contours (subtle)
  for(let i=0;i<5;i++){
    mc.strokeStyle=`rgba(10,50,120,${0.08+i*0.02})`;
    mc.lineWidth=1;
    mc.beginPath();
    for(let x=0;x<=MW;x+=10){
      mc.lineTo(x, MH*0.15+i*MH*0.15+Math.sin(x*0.015+t*0.2+i)*8);
    }
    mc.stroke();
  }

  // Nautical grid
  mc.strokeStyle='rgba(15,50,100,0.3)'; mc.lineWidth=0.5;
  for(let x=0;x<MW;x+=MW/10){mc.beginPath();mc.moveTo(x,0);mc.lineTo(x,MH);mc.stroke();}
  for(let y=0;y<MH;y+=MH/8){mc.beginPath();mc.moveTo(0,y);mc.lineTo(MW,y);mc.stroke();}

  // Lat/Lon labels (subtle)
  mc.fillStyle='rgba(20,60,120,0.35)'; mc.font=`8px 'Courier New'`; mc.textAlign='left';
  const lonLabels=[100,110,120,130,140];
  lonLabels.forEach(lon=>{
    const [x]=geoToXY(lon,0,MW,MH);
    mc.fillText(lon+'°',x+2,MH-4);
  });

  // Islands — geographically accurate
  GEO_ISLANDS.forEach(isl=>{
    const screenPts=isl.pts.map(([lon,lat])=>geoToXY(lon,lat,MW,MH));
    const cx=screenPts.reduce((s,[x])=>s+x,0)/screenPts.length;
    const cy=screenPts.reduce((s,[,y])=>s+y,0)/screenPts.length;

    // Drop shadow
    mc.save(); mc.translate(2,3);
    mc.fillStyle='rgba(0,0,0,0.5)';
    mc.beginPath();
    screenPts.forEach(([x,y],i)=>i?mc.lineTo(x,y):mc.moveTo(x,y));
    mc.closePath(); mc.fill(); mc.restore();

    // Island body with radial gradient (elevation feel)
    const sz=Math.max(...screenPts.map(([x])=>x))-Math.min(...screenPts.map(([x])=>x));
    const ig=mc.createRadialGradient(cx,cy-sz*0.1,2,cx,cy,sz*0.7);
    ig.addColorStop(0,isl.col2);
    ig.addColorStop(1,isl.col);
    mc.fillStyle=ig;
    mc.beginPath();
    screenPts.forEach(([x,y],i)=>i?mc.lineTo(x,y):mc.moveTo(x,y));
    mc.closePath(); mc.fill();

    // Coastline
    mc.strokeStyle='rgba(60,180,80,0.45)'; mc.lineWidth=0.8;
    mc.beginPath();
    screenPts.forEach(([x,y],i)=>i?mc.lineTo(x,y):mc.moveTo(x,y));
    mc.closePath(); mc.stroke();

    // Highlight top edge
    mc.strokeStyle='rgba(80,200,100,0.15)'; mc.lineWidth=1.5;
    mc.beginPath();
    screenPts.slice(0,Math.ceil(screenPts.length*0.35)).forEach(([x,y],i)=>i?mc.lineTo(x,y):mc.moveTo(x,y));
    mc.stroke();

    // Island name label
    if(isl.label){
      mc.fillStyle='rgba(100,200,120,0.5)';
      mc.font=`${Math.max(7,Math.min(11,sz*0.12))}px 'Courier New'`;
      mc.textAlign='center';
      mc.fillText(isl.lname,cx,cy+3);
    }
  });

  // Shimmer sparkles on ocean
  for(let i=0;i<18;i++){
    const sx=(i*173+50)%MW, sy=(i*97+20)%(MH*0.92);
    const a=0.04+0.04*Math.sin(t*1.3+i*0.7);
    mc.fillStyle=`rgba(80,160,255,${a})`;
    mc.beginPath(); mc.arc(sx,sy,1.2,0,Math.PI*2); mc.fill();
  }

  // Compass rose
  drawCompass(52,MH-52,26,t);

  // Location markers (using real geo coords)
  LOCS.forEach((l,i)=>{
    const [x,y]=geoToXY(l.mapLon,l.mapLat,MW,MH);
    const sel=i===G.locI;

    // Animated pulse rings
    if(sel){
      for(let r=0;r<3;r++){
        const phase=(t*1.5+r*0.5)%2;
        mc.strokeStyle=`rgba(245,200,66,${Math.max(0,0.5-phase*0.25)})`;
        mc.lineWidth=1;
        mc.beginPath(); mc.arc(x,y,12+phase*18,0,Math.PI*2); mc.stroke();
      }
    }

    // Pin glow
    mc.shadowColor=sel?'#f5c842':'#4a9eff'; mc.shadowBlur=sel?14:7;
    mc.fillStyle=sel?'#f5c842':'#4a9eff';
    mc.beginPath(); mc.arc(x,y,sel?7:5,0,Math.PI*2); mc.fill();
    mc.shadowBlur=0;
    mc.fillStyle=sel?'#1a1000':'#001a3a';
    mc.beginPath(); mc.arc(x,y,sel?3:2.5,0,Math.PI*2); mc.fill();

    // Label
    mc.textAlign='center';
    mc.fillStyle=sel?'#f5c842':'rgba(180,215,250,0.85)';
    mc.font=`${sel?700:400} ${sel?11:9}px 'Courier New'`;
    mc.fillText(l.name,x,y-(sel?17:13));
    if(sel){
      mc.fillStyle='rgba(245,200,66,0.65)';
      mc.font=`8px 'Courier New'`;
      mc.fillText(l.region,x,y-7);
    }
  });

  // Map title watermark
  mc.fillStyle='rgba(245,200,66,0.06)';
  mc.font=`bold ${MW*0.05}px 'Courier New'`;
  mc.textAlign='center';
  mc.fillText('NUSANTARA',MW*0.5,MH*0.52);

  mapC.onclick=e=>{
    const r=mapC.getBoundingClientRect();
    const clickLon=LON_MIN+(e.clientX-r.left)/r.width*(LON_MAX-LON_MIN);
    const clickLat=LAT_MAX-(e.clientY-r.top)/r.height*(LAT_MAX-LAT_MIN);
    LOCS.forEach((l,i)=>{
      if(Math.abs(clickLon-l.mapLon)<3&&Math.abs(clickLat-l.mapLat)<2){
        G.locI=i;G.spotI=0;updMapInfo();saveGame();
      }
    });
  };
}
function drawCompass(cx,cy,r,t){
  // Rose
  mc.strokeStyle='rgba(245,200,66,0.4)'; mc.lineWidth=1;
  mc.beginPath(); mc.arc(cx,cy,r,0,Math.PI*2); mc.stroke();
  // N S E W
  const dirs=[['N',0],['E',Math.PI/2],['S',Math.PI],['W',Math.PI*1.5]];
  dirs.forEach(([l,a])=>{
    const dx=Math.sin(a)*(r-4), dy=-Math.cos(a)*(r-4);
    mc.fillStyle=l==='N'?'rgba(245,200,66,0.8)':'rgba(100,160,220,0.5)';
    mc.font=`bold 8px 'Courier New'`;
    mc.textAlign='center';
    mc.fillText(l,cx+dx,cy+dy+3);
  });
  // Needle
  mc.strokeStyle='rgba(245,200,66,0.6)'; mc.lineWidth=1.5;
  mc.beginPath(); mc.moveTo(cx,cy-r+8); mc.lineTo(cx,cy+r-8); mc.stroke();
  mc.beginPath(); mc.moveTo(cx-r+8,cy); mc.lineTo(cx+r-8,cy); mc.stroke();
}

function updMapInfo(){
  const l=LOCS[G.locI];
  document.getElementById('lpName').textContent=l.name.toUpperCase();
  document.getElementById('lpRegion').textContent=l.region;

}

const fishC=document.getElementById('fishC');
const fc=fishC.getContext('2d');
const rainC=document.getElementById('rainC');
let FW=0,FH=0;

function goFish(){
  const l=LOCS[G.locI]; const sp=l.spots[G.spotI];
  document.getElementById('fhLoc').textContent=l.name.toUpperCase();
  document.getElementById('fhSpot').textContent=sp.name+' — '+sp.desc;
  document.getElementById('fhRight').textContent=RODS[G.rod].name.toUpperCase();
  randomWeather();
  rainC.width=FW; rainC.height=FH;
  initRain(rainC);
  resetF(); initScene(); S('sFish');
  msg('Siap mancing!','Tahan LEMPAR lalu lepaskan',3000);
}

function initScene(){
  G.waves=[];
  for(let i=0;i<7;i++) G.waves.push({x:Math.random()*FW,y:FH*.34+Math.random()*FH*.12,r:12+Math.random()*35,a:.05+Math.random()*.08,spd:.3+Math.random()*.5});
  G.fish3=[];
  const sp=LOCS[G.locI].spots[G.spotI];
  for(let i=0;i<11;i++){
    const fid=sp.fish[Math.floor(Math.random()*sp.fish.length)];
    const f=FDB[fid];
    const clr=f.r==='legendary'?'#f5c842':f.r==='epic'?'#a855f7':f.r==='rare'?'#4a9eff':'#60a5fa';
    G.fish3.push({x:Math.random()*FW,y:FH*.5+Math.random()*FH*.38,vx:(Math.random()-.5)*1.6,vy:(Math.random()-.5)*.3,sz:5+Math.random()*16,a:.1+Math.random()*.22,ph:Math.random()*Math.PI*2,c:clr});
  }
}

function drawFishScene(t){
  if(!FW||!FH) return;
  const l=LOCS[G.locI];
  const wth=WEATHERS[curWeather];

  // Sky — varies by weather
  const skyAlpha=wth.id==='storm'?0.7:wth.id==='rain'?0.5:wth.id==='cloudy'?0.3:0;
  const sg=fc.createLinearGradient(0,0,0,FH*.38);
  sg.addColorStop(0,l.skyCol||l.col); sg.addColorStop(1,l.wCol);
  fc.fillStyle=sg; fc.fillRect(0,0,FW,FH*.38);

  // Storm cloud overlay
  if(skyAlpha>0){
    const cloudGrad=fc.createLinearGradient(0,0,0,FH*.38);
    cloudGrad.addColorStop(0,`rgba(20,20,30,${skyAlpha})`);
    cloudGrad.addColorStop(1,'rgba(0,0,0,0)');
    fc.fillStyle=cloudGrad; fc.fillRect(0,0,FW,FH*.38);
  }

  // Stars (only sunny/cloudy)
  if(curWeather<2){
    for(let i=0;i<20;i++){
      const sx=(i*89+11)%FW,sy=(i*47+5)%(FH*.28);
      fc.fillStyle=`rgba(255,255,255,${.05+.06*Math.sin(t*1.5+i)})`;
      fc.beginPath();fc.arc(sx,sy,.8,0,Math.PI*2);fc.fill();
    }
  }

  // Distant mountains
  fc.fillStyle='rgba(0,0,0,0.35)';
  fc.beginPath();fc.moveTo(0,FH*.36);
  for(let x=0;x<=FW;x+=15) fc.lineTo(x,FH*.36-8-Math.sin(x*.04)*6-Math.sin(x*.015+2)*10);
  fc.lineTo(FW,FH*.38);fc.lineTo(0,FH*.38);fc.closePath();fc.fill();

  // Water
  const wg=fc.createLinearGradient(0,FH*.35,0,FH);
  wg.addColorStop(0,l.wCol);wg.addColorStop(.3,'rgba(5,20,50,0.97)');wg.addColorStop(1,'#010810');
  fc.fillStyle=wg;
  fc.beginPath();fc.moveTo(0,FH*.35);
  for(let x=0;x<=FW;x+=7) fc.lineTo(x,FH*.35+Math.sin(x*.03+t*.8)*6);
  fc.lineTo(FW,FH);fc.lineTo(0,FH);fc.closePath();fc.fill();

  // Water shimmer
  fc.strokeStyle='rgba(80,160,255,.06)';fc.lineWidth=1;
  for(let i=0;i<5;i++){
    const wy=FH*.43+i*FH*.1+Math.sin(t*.5+i)*7;
    fc.beginPath();for(let x=0;x<FW;x+=5) fc.lineTo(x,wy+Math.sin(x*.04+t+i*1.3)*3);fc.stroke();
  }

  // Waves
  G.waves.forEach(w=>{
    w.x-=w.spd*(wth.id==='storm'?2:1);if(w.x<-60) w.x=FW+40;
    fc.strokeStyle=`rgba(255,255,255,${w.a})`;fc.lineWidth=1.5;
    fc.beginPath();fc.arc(w.x,w.y,w.r,Math.PI+.3,Math.PI*2-.3);fc.stroke();
  });

  // Underwater fish
  G.fish3.forEach(f=>{
    f.x+=f.vx;f.y+=f.vy;f.ph+=.04;
    if(f.x<-50) f.x=FW+40;if(f.x>FW+60) f.x=-40;
    if(f.y<FH*.44) f.vy=Math.abs(f.vy)*.8;if(f.y>FH*.91) f.vy=-Math.abs(f.vy)*.8;
    const s=f.sz,bob=Math.sin(f.ph)*2.5;
    fc.save();fc.translate(f.x,f.y+bob);fc.scale(f.vx>0?1:-1,1);
    fc.globalAlpha=f.a;fc.fillStyle=f.c;
    fc.beginPath();fc.ellipse(0,0,s,s*.38,0,0,Math.PI*2);fc.fill();
    fc.beginPath();fc.moveTo(-s*.6,0);fc.lineTo(-s*1.2,s*.5);fc.lineTo(-s*1.2,-s*.5);fc.closePath();fc.fill();
    fc.globalAlpha=1;fc.restore();
  });

  // Rod
  const rx=FW*.8,ry=FH*.7;
  fc.strokeStyle='#6b3a0f';fc.lineWidth=6;fc.lineCap='round';
  fc.beginPath();fc.moveTo(rx,FH*.97);fc.lineTo(rx-30,ry);fc.stroke();
  fc.strokeStyle='#c07820';fc.lineWidth=3;
  fc.beginPath();fc.moveTo(rx-30,ry);fc.lineTo(rx-50,ry-50);fc.stroke();
  fc.fillStyle='#334155';fc.beginPath();fc.arc(rx-10,FH*.88,8,0,Math.PI*2);fc.fill();
  fc.fillStyle='#64748b';fc.beginPath();fc.arc(rx-10,FH*.88,4,0,Math.PI*2);fc.fill();

  // Line & bobber
  if(G.lineOn){
    const bx=G.bX,by=G.bY;
    const tx2=rx-50,ty2=ry-50;
    fc.strokeStyle='rgba(180,210,255,.6)';fc.lineWidth=1;
    fc.beginPath();fc.moveTo(tx2,ty2);fc.quadraticCurveTo((tx2+bx)*.5,(ty2+by)*.5-20,bx,by);fc.stroke();
    const shk=G.gs==='biting'?(Math.random()-.5)*7:0;
    const bxs=bx+shk;
    fc.fillStyle='#1e3a8a';fc.beginPath();fc.arc(bxs,by-11,8,0,Math.PI*2);fc.fill();
    fc.fillStyle='#dc2626';fc.beginPath();fc.arc(bxs,by-3,8,0,Math.PI,false);fc.fill();
    fc.fillStyle='rgba(255,255,255,.45)';fc.beginPath();fc.arc(bxs-2,by-13,2.5,0,Math.PI*2);fc.fill();
    fc.strokeStyle='#475569';fc.lineWidth=1.5;fc.beginPath();fc.moveTo(bxs,by+5);fc.lineTo(bxs,by-3);fc.stroke();
    if(G.gs==='waiting'||G.gs==='biting'){
      const ri=(Date.now()%1500)/1500;
      fc.strokeStyle=`rgba(100,200,255,${.5-ri*.4})`;fc.lineWidth=1;fc.beginPath();fc.arc(bxs,by+2,7+ri*22,0,Math.PI*2);fc.stroke();
    }
  }

  // Particles
  G.parts=G.parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=.025;
    fc.globalAlpha=p.l;fc.fillStyle=p.c;fc.beginPath();fc.arc(p.x,p.y,p.r,0,Math.PI*2);fc.fill();fc.globalAlpha=1;
    return p.l>0;
  });
  if(G.biteFlash>0){
    G.biteFlash-=.04;fc.strokeStyle=`rgba(245,200,66,${G.biteFlash})`;fc.lineWidth=2.5;fc.beginPath();fc.arc(G.bX,G.bY,32*(1-G.biteFlash),0,Math.PI*2);fc.stroke();
  }

  // Rain overlay
  drawRain(rainC);
}

const mmC=document.getElementById('mmC');

  mmc.strokeStyle='rgba(40,180,80,.5)'; mmc.lineWidth=1.5; mmc.beginPath();
  for(let x=0;x<mw;x+=3) mmc.lineTo(x,mh*.38+Math.sin(x*.3)*2.5); mmc.stroke();

}

// CAST MECHANICS
// ═══════════════════════════════════
function startCast(){
  if(G.gs!=='idle') return;
  G.gs='casting';G.cPow=0;G.cDir=1;
  show('bCast',true);document.getElementById('bCastBtn').textContent='LEPAS!';
  G.ci=setInterval(()=>{
    G.cPow+=.045*G.cDir;
    if(G.cPow>=1){G.cPow=1;G.cDir=-1;}if(G.cPow<=0){G.cPow=0;G.cDir=1;}
    document.getElementById('bCastF').style.width=(G.cPow*100)+'%';
  },44);
}
function relCast(){
  if(G.gs!=='casting') return;
  clearInterval(G.ci); const pw=G.cPow;
  show('bCast',false); document.getElementById('bCastBtn').style.display='none';
  const tx=FW*.15+pw*FW*.52, ty=FH*.36+Math.sin(tx*.03)*6;
  G.bX=FW*.8-50; G.bY=FH*.7-50; G.lineOn=true;
  const sx=G.bX,sy=G.bY; let prog=0;
  const ani=setInterval(()=>{
    prog+=.07;G.bX=sx+(tx-sx)*prog;G.bY=sy+(ty-sy)*prog-Math.sin(prog*Math.PI)*65;
    if(prog>=1){
      clearInterval(ani);G.bX=tx;G.bY=ty;G.gs='waiting';
      spawnP(G.bX,G.bY,'water');msg('Menunggu gigitan...','');
      const wth=WEATHERS[curWeather];
      const rod=RODS[G.rod].power;
      const baseWait=1800+Math.random()*5500/rod;
      G.wt=setTimeout(()=>{
        if(G.gs!=='waiting') return;
        G.gs='biting'; G.biteFlash=1;
        const sp=LOCS[G.locI].spots[G.spotI];
        const fid=sp.fish[Math.floor(Math.random()*sp.fish.length)];
        G.curF={...FDB[fid],_id:fid};
        msg('►► IKAN GIGIT! ◄◄','Tekan TARIK sekarang!');
        show('bReel',true);show('bTens',true);
        document.getElementById('bReelBtn').style.display='block';
        G.fDist=100;G.tens=35;
        G.mt=setTimeout(()=>{if(G.gs==='biting'){msg('Ikan kabur!','',2000);resetF();}},7500);
      },baseWait/wth.biteMult);
    }
  },28);
}
function tapReel(){
  if(G.gs!=='biting'&&G.gs!=='reeling') return;
  G.gs='reeling'; clearTimeout(G.mt);
  const spd=RODS[G.rod].speed;
  G.fDist=Math.max(0,G.fDist-9*spd); G.tens=Math.min(100,G.tens+15);
  if(!G.ti){
    G.ti=setInterval(()=>{
      if(G.gs!=='reeling'){clearInterval(G.ti);G.ti=null;return;}
      G.tens=Math.max(0,G.tens-4);
      if(Math.random()<.08) G.tens=Math.min(100,G.tens+9);
      if(G.tens>=94){msg('SENAR PUTUS!','',1500);spawnP(G.bX,G.bY,'snap');clearInterval(G.ti);G.ti=null;resetF();return;}
      updBars();
    },180);
  }
  updBars(); if(G.fDist<=0) doCatch();
}
function updBars(){
  document.getElementById('bReelF').style.width=(100-G.fDist)+'%';
  document.getElementById('bTensF').style.width=G.tens+'%';
  const t=G.tens/100;
  document.getElementById('bTensF').style.background=t<.5?'var(--green)':t<.75?'var(--gold)':'var(--red)';
}
function doCatch(){
  clearInterval(G.ti);G.ti=null;
  const fish=G.curF; G.gs='caught';
  const isR=fish.spec==='release';
  const coins=isR?0:Math.floor(fish.min+Math.random()*(fish.max-fish.min));
  if(!isR){G.coins+=coins;G.total++;G.col[fish._id]=(G.col[fish._id]||0)+1;checkQ(fish._id);}
  spawnP(G.bX,G.bY,'catch');
  const rn={common:'COMMON',rare:'RARE',epic:'EPIC',legendary:'LEGENDARY'};
  document.getElementById('ccEmo').textContent=fish.e;
  document.getElementById('ccName').textContent=fish.n.toUpperCase();
  document.getElementById('ccRar').className='cc-rar r-'+fish.r;
  document.getElementById('ccRar').textContent=rn[fish.r];
  document.getElementById('ccCoins').textContent=isR?'DILEPAS KEMBALI':'+'+coins.toLocaleString()+' KOIN';
  document.getElementById('ccDesc').textContent=fish.d;
  document.getElementById('catchPop').classList.add('on');
  saveGame(); updHUD();
}
function closeCatch(){document.getElementById('catchPop').classList.remove('on');resetF();}
function resetF(){
  clearTimeout(G.wt);clearTimeout(G.mt);clearInterval(G.ti);G.ti=null;clearInterval(G.ci);
  G.gs='idle';G.lineOn=false;G.curF=null;G.parts=[];
  document.getElementById('bCastBtn').style.cssText='display:block';
  document.getElementById('bCastBtn').textContent='LEMPAR';
  document.getElementById('bReelBtn').style.display='none';
  show('bCast',false);show('bReel',false);show('bTens',false);
  document.getElementById('msgPill').classList.remove('show');
}
function leaveSpot(){resetF();S('sMap');}
function show(id,v){document.getElementById(id).style.display=v?'flex':'none';}
function spawnP(x,y,type){
  const cols=type==='water'?['#4a9eff','#93c5fd','#fff']:type==='catch'?['#f5c842','#f59e0b','#fff']:['#ff4757','#94a3b8'];
  for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5;G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:1.5+Math.random()*3.5,l:1,c:cols[Math.floor(Math.random()*cols.length)]});}
}
let msgTO=null;
function msg(t,s='',dur=0){
  const el=document.getElementById('msgPill');
  el.innerHTML=t+(s?`<br><span style="font-size:9px;color:var(--muted)">${s}</span>`:'');
  el.classList.add('show');clearTimeout(msgTO);if(dur>0) msgTO=setTimeout(()=>el.classList.remove('show'),dur);
}

function goNPC(from){
  G.prevScr=from==='fish'?'sFish':'sMap';
  document.getElementById('npcBackBtn').onclick=()=>S(G.prevScr);
  const l=LOCS[G.locI];const npc=l.npc;

  document.getElementById('npcPortrait').textContent=npc.emo;
  document.getElementById('npcName').textContent=npc.name;
  document.getElementById('npcRole').textContent=npc.title;
  const nc=document.getElementById('npcBg');
  nc.width=nc.offsetWidth||400;nc.height=nc.offsetHeight||180;
  const ng=nc.getContext('2d');
  const nbg=ng.createLinearGradient(0,0,0,nc.height);
  nbg.addColorStop(0,l.skyCol||l.col);nbg.addColorStop(1,'#000');
  ng.fillStyle=nbg;ng.fillRect(0,0,nc.width,nc.height);
  for(let i=0;i<30;i++){ng.fillStyle=`rgba(255,255,255,${Math.random()*.1})`;ng.beginPath();ng.arc(Math.random()*nc.width,Math.random()*nc.height*.6,.8,0,Math.PI*2);ng.fill();}
  dialog(npc.intro,[
    {t:'Lihat Quest',cl:'q',fn:()=>showQNPC()},

    {t:'Cerita '+l.name,fn:()=>showLoreNPC()},
    {t:'Tips Mancing',fn:()=>showTipsNPC()},
    {t:'Sampai nanti',fn:()=>S(G.prevScr)},
  ]);
  S('sNpc');
}
function dialog(txt,choices){
  document.getElementById('dialogText').textContent=txt;
  const cc=document.getElementById('choices');cc.innerHTML='';
  choices.forEach(c=>{const b=document.createElement('button');b.className='choice'+(c.cl?' '+c.cl:'');b.textContent='► '+c.t;b.onclick=c.fn;cc.appendChild(b);});
}
function showQNPC(){
  const l=LOCS[G.locI];const npc=l.npc;
  dialog(`${npc.name}: "Saya punya misi penting. Bantu saya ya!"`,
    l.quests.map(qid=>{const q=QDB[qid],pr=G.qProg[qid]||0,dn=G.qDone.includes(qid);const st=dn?'✓':pr>0?`${pr}/${q.need}`:'BARU';return{t:`${q.t} [${st}]`,cl:dn?'ok':'q',fn:()=>showQDetail(qid)};})
    .concat([{t:'Kembali',fn:()=>goNPC('npc')}]));
}
function showQDetail(qid){
  const q=QDB[qid],pr=G.qProg[qid]||0,dn=G.qDone.includes(qid);
  const npc=LOCS[G.locI].npc;
  let txt=`${npc.name}: "${q.d}"\n\nProgress: ${pr}/${q.need}\nReward: ${q.rew} koin`;
  if(dn) txt+='\n\n✓ Quest selesai! Klaim reward-mu.';
  const chs=[];
  if(!dn) chs.push({t:'Terima Quest',cl:'ok',fn:()=>{toast('Quest: '+q.t);showQNPC();}});
  if(dn) chs.push({t:'Klaim '+q.rew+' Koin',cl:'ok',fn:()=>{G.coins+=q.rew;saveGame();updHUD();toast('Reward: +'+q.rew+' koin!');G.qDone=G.qDone.filter(x=>x!==qid);showQNPC();}});
  chs.push({t:'Kembali',fn:()=>showQNPC()});
  dialog(txt,chs);
}
function showSpotNPC(){
  const l=LOCS[G.locI];const npc=l.npc;
  dialog(`${npc.name}: "Di ${l.name} ada ${l.spots.length} spot bagus:"`,
    l.spots.map((sp,i)=>{const fs=sp.fish.slice(0,2).map(f=>FDB[f]?.n.split(' ').pop()).join(', ');return{t:`${sp.name} — ${fs}`,fn:()=>dialog(`${npc.name}: "${sp.name}: ${sp.desc}. Ada ${sp.fish.map(f=>FDB[f]?.n).join(', ')} di sini."`,
      [{t:'Pergi ke sini',cl:'ok',fn:()=>{G.spotI=i;goFish();}},{t:'Kembali',fn:()=>showSpotNPC()}])};})
    .concat([{t:'Kembali',fn:()=>goNPC('npc')}]));
}
function showLoreNPC(){const l=LOCS[G.locI];const npc=l.npc;document.getElementById('dialogText').textContent=`${npc.name}: "${npc.lore}"`;const cc=document.getElementById('choices');cc.innerHTML='';const b=document.createElement('button');b.className='choice ok';b.textContent='► Menarik!';b.onclick=()=>goNPC('npc');cc.appendChild(b);}
function showTipsNPC(){const l=LOCS[G.locI];const npc=l.npc;document.getElementById('dialogText').textContent=`${npc.name}: "${npc.tip}"`;const cc=document.getElementById('choices');cc.innerHTML='';const b=document.createElement('button');b.className='choice ok';b.textContent='► Terima kasih!';b.onclick=()=>goNPC('npc');cc.appendChild(b);}

// ═══════════════════════════════════
// QUEST
// ═══════════════════════════════════
function checkQ(fishId){
  const l=LOCS[G.locI];
  l.quests.forEach(qid=>{
    if(G.qDone.includes(qid)) return;
    const q=QDB[qid];
    if(q.fish===fishId){
      G.qProg[qid]=(G.qProg[qid]||0)+1;
      if(G.qProg[qid]>=q.need){if(!G.qDone.includes(qid)) G.qDone.push(qid);toast('QUEST SELESAI: '+q.t+'! Klaim di NPC');}
      else toast('Quest: '+q.t+' '+G.qProg[qid]+'/'+q.need);
    }
  });
  saveGame();
}
function renderQuests(){
  const qb=document.getElementById('qBody');qb.innerHTML='';
  LOCS.forEach(l=>{
    const hdr=document.createElement('div');
    hdr.style.cssText='font-size:10px;color:var(--muted);letter-spacing:2px;margin:4px 0 6px;padding-top:4px;border-top:1px solid var(--border)';
    hdr.textContent=l.name.toUpperCase()+' — '+l.region;qb.appendChild(hdr);
    l.quests.forEach(qid=>{
      const q=QDB[qid],pr=G.qProg[qid]||0,dn=G.qDone.includes(qid);const pct=Math.min(100,pr/q.need*100);
      const card=document.createElement('div');card.className='qcard'+(dn?' done':pr>0?' active':'');
      card.innerHTML=`<div class="qtop"><span class="qtitle">${q.t}</span><span class="qbadge ${dn?'qb-done':pr>0?'qb-act':'qb-new'}">${dn?'DONE':pr>0?'AKTIF':'BARU'}</span></div><div class="qdesc">${q.d}</div><div class="qpbar"><div class="qpbg"><div class="qpfill" style="width:${pct}%"></div></div><span style="font-size:9px;color:var(--muted)">${pr}/${q.need}</span></div><div class="qrew">⬡ ${q.rew} KOIN</div>`;
      qb.appendChild(card);
    });
  });
}

// ═══════════════════════════════════
// SHOP
// ═══════════════════════════════════
function renderShop(){
  const sb=document.getElementById('shopBody');sb.innerHTML='';
  const coinDiv=document.createElement('div');coinDiv.className='shop-coins';
  coinDiv.innerHTML=`Koin kamu: <b>${G.coins.toLocaleString()}</b>`;
  sb.appendChild(coinDiv);
  RODS.forEach((rod,i)=>{
    const owned=i<=G.rod||i===0;
    const equipped=i===G.rod;
    const canBuy=!owned&&G.coins>=rod.price;
    const card=document.createElement('div');
    card.className='rod-card'+(equipped?' equipped':owned?' owned':'');
    card.innerHTML=`
      <div class="rod-top">
        <span class="rod-name">${rod.icon} ${rod.name}</span>
        <span class="rod-badge ${equipped?'rb-equip':owned?'rb-owned':'rb-lock'}">${equipped?'EQUIPPED':owned?'OWNED':'LOCKED'}</span>
      </div>
      <div class="rod-stats">
        <span>PWR <span>${rod.power}x</span></span>
        <span>SPD <span>${rod.speed}x</span></span>
        <span>HARGA <span>${rod.price===0?'GRATIS':rod.price.toLocaleString()+' koin'}</span></span>
      </div>
      <div class="rod-desc">${rod.desc}</div>
      <button class="rod-btn ${equipped?'':owned?'equip':'buy'}" 
        onclick="shopAction(${i})"
        ${equipped?'disabled':''}>
        ${equipped?'DIGUNAKAN':owned?'► PAKAI':'► BELI '+rod.price.toLocaleString()+' KOIN'}
      </button>`;
    sb.appendChild(card);
  });
}
function shopAction(i){
  const rod=RODS[i];
  const owned=i<=G.rod||i===0;
  if(!owned){
    if(G.coins<rod.price){toast('Koin tidak cukup!');return;}
    G.coins-=rod.price;
  }
  G.rod=i;
  saveGame();updHUD();
  toast('Rod '+rod.name+' dipasang!');
  renderShop();
}

// ═══════════════════════════════════
// HUD & UTILS
// ═══════════════════════════════════
function updHUD(){
  ['mCoin','fCoin'].forEach(id=>document.getElementById(id).textContent=G.coins.toLocaleString());
  ['mCatch','fCatch'].forEach(id=>document.getElementById(id).textContent=G.total);
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2600);}

// ═══════════════════════════════════
// RESIZE
// ═══════════════════════════════════
function resize(){
  MW=mapC.width=mapC.offsetWidth; MH=mapC.height=mapC.offsetHeight;
  FW=fishC.width=fishC.offsetWidth; FH=fishC.height=fishC.offsetHeight;
  rainC.width=FW; rainC.height=FH;
  updMapInfo();
}
window.addEventListener('resize',resize);

// ═══════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();
    if(G.gs==='idle') startCast();
    else if(G.gs==='casting') relCast();
    else if(G.gs==='biting'||G.gs==='reeling') tapReel();
  }
});
document.addEventListener('keyup',e=>{if(e.code==='Space'&&G.gs==='casting') relCast();});

// ═══════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════
function loop(ts){
  const t=ts*.001;
  const as=document.querySelector('.scr.on');
  if(as){
    if(as.id==='sMap'){drawBeautifulMap(t);}
    else if(as.id==='sFish'){fc.clearRect(0,0,FW,FH);drawFishScene(t);drawMM();}
  }
  requestAnimationFrame(loop);
}

// PWA
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// INIT
setTimeout(()=>{resize();updHUD();requestAnimationFrame(loop);},50);
</script>
</body>
</html>
